<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Focus Tracker Dashboard</title>
    <style>
      body {
        font-family: sans-serif;
        max-width: 680px;
        margin: 40px auto;
        padding: 20px;
        background-color: #f4f4f4;
        border-radius: 10px;
      }
      h1 { text-align: center; }

      /* ── Indicator lights ── */
      .indicators {
        display: flex;
        gap: 16px;
        align-items: center;
        margin-bottom: 8px;
      }
      .indicator {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 14px;
        font-weight: bold;
        color: #555;
      }
      .dot {
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background-color: #ccc;
        transition: background-color 0.2s;
      }
      .dot.active-red  { background-color: #e53935; animation: blink 0.7s infinite; }
      .dot.active-green { background-color: #43a047; animation: blink 0.7s infinite; }

      @keyframes blink {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.2; }
      }

      /* ── Webcam ── */
      #video { display: block; border-radius: 6px; }

      /* ── Buttons & forms ── */
      button, input[type="submit"] {
        padding: 10px 20px;
        background-color: #4caf50;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        margin-top: 10px;
      }
      #confirmation {
        color: green;
        margin-top: 10px;
        font-weight: bold;
      }
      #status-message {
        margin-top: 10px;
        font-weight: bold;
        color: green;
      }
      form {
        margin-bottom: 20px;
        padding: 15px;
        background-color: #fff;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <h1>Focus Tracker Dashboard</h1>

    <!-- Detection indicator lights -->
    <div class="indicators">
      <div class="indicator">
        <div class="dot" id="phone-dot"></div>
        Phone detected
      </div>
      <div class="indicator">
        <div class="dot" id="gaze-dot"></div>
        Eyes off screen
      </div>
    </div>

    <!-- Webcam feed -->
    <video id="video" width="640" height="480" autoplay></video>

    <br/>

    <!-- Capture -->
    <form id="capture-form">
      <button type="button" onclick="captureFrame()">Capture</button>
    </form>
    <div id="confirmation" style="display:none"></div>

    <canvas id="canvas" width="640" height="480" style="display:none"></canvas>

    <!-- Monitoring controls -->
    <div>
      <button id="start-btn">Start Monitoring</button>
      <button id="stop-btn" style="background-color:#e53935; display:none">Stop Monitoring</button>
      <p id="status-message" style="display:none"></p>
    </div>

    <!-- Train / Test -->
    <form action="/train" method="POST">
      <h3>TODO: Train Model</h3>
      <input type="submit" value="Train" />
    </form>
    <form action="/test" method="POST">
      <h3>Test Buttons</h3>
      <input type="submit" value="Start" />
    </form>

    <script>
      // ── Webcam ──────────────────────────────────────────────
      const video = document.getElementById("video");
      const canvas = document.getElementById("canvas");
      const confirmation = document.getElementById("confirmation");

      navigator.mediaDevices.getUserMedia({ video: true }).then((stream) => {
        video.srcObject = stream;
      });

      function captureFrame() {
        const ctx = canvas.getContext("2d");
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const dataUrl = canvas.toDataURL("image/jpeg", 0.7);

        fetch("/capture", {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: "image=" + encodeURIComponent(dataUrl),
        })
          .then((res) => res.json())
          .then((data) => {
            confirmation.style.display = "block";
            confirmation.textContent = "✅ " + data.message;
            setTimeout(() => { confirmation.style.display = "none"; }, 5000);
          });
      }

      // ── Monitoring controls ─────────────────────────────────
      const startBtn = document.getElementById("start-btn");
      const stopBtn  = document.getElementById("stop-btn");
      const statusMsg = document.getElementById("status-message");

      startBtn.addEventListener("click", () => {
        fetch("/start-monitoring", { method: "POST" })
          .then((res) => res.json())
          .then((data) => {
            statusMsg.style.display = "block";
            statusMsg.style.color = "green";
            statusMsg.textContent =
              data.status === "started" ? "✅ Monitoring started." : "⚠️ Already running.";
            startBtn.style.display = "none";
            stopBtn.style.display  = "inline-block";
          });
      });

      stopBtn.addEventListener("click", () => {
        fetch("/stop-monitoring", { method: "POST" })
          .then((res) => res.json())
          .then(() => {
            statusMsg.style.display = "block";
            statusMsg.style.color = "#555";
            statusMsg.textContent = "Monitoring stopped.";
            startBtn.style.display = "inline-block";
            stopBtn.style.display  = "none";
          });
      });

      // ── Detection indicator polling ─────────────────────────
      const phoneDot = document.getElementById("phone-dot");
      const gazeDot  = document.getElementById("gaze-dot");

      function updateIndicators() {
        fetch("/status")
          .then((res) => res.json())
          .then((data) => {
            phoneDot.className = "dot" + (data.phone     ? " active-red"   : "");
            gazeDot.className  = "dot" + (data.eyes_off  ? " active-green" : "");
          })
          .catch(() => {}); // silently ignore if server not ready
      }

      setInterval(updateIndicators, 1000);
    </script>
  </body>
</html>
