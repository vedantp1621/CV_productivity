<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Focus Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0b;
      --surface:   #111114;
      --surface-2: #1a1a1f;
      --border:    #2a2a30;
      --border-2:  #3a3a42;
      --text:      #f0f0f2;
      --muted:     #666672;
      --accent:    #4f7eff;
      --green:     #22c55e;
      --red:       #ef4444;
      --red-dim:   rgba(239,68,68,.10);
      --red-ring:  rgba(239,68,68,.35);
      --amber:     #f59e0b;
      --amber-dim: rgba(245,158,11,.10);
      --amber-ring:rgba(245,158,11,.35);
      --r:         10px;
      --r-sm:      6px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-size: 14px;
    }

    /* ── Header ──────────────────────────────────────────────────── */
    header {
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 9px;
      font-weight: 600;
      font-size: 13px;
      letter-spacing: -.01em;
    }

    .logo-mark {
      width: 26px;
      height: 26px;
      background: var(--accent);
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }

    .status-badge {
      font-size: 11.5px;
      font-weight: 500;
      padding: 3px 11px;
      border-radius: 99px;
      border: 1px solid var(--border);
      color: var(--muted);
      transition: all .2s;
    }
    .status-badge.running {
      background: rgba(34,197,94,.12);
      border-color: rgba(34,197,94,.35);
      color: var(--green);
    }

    /* ── Main ────────────────────────────────────────────────────── */
    main {
      flex: 1;
      padding: 24px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .layout {
      width: 100%;
      max-width: 980px;
      display: grid;
      grid-template-columns: 1fr 256px;
      gap: 20px;
      align-items: start;
    }

    /* ── Feed ────────────────────────────────────────────────────── */
    .feed-card {
      border: 1px solid var(--border);
      border-radius: var(--r);
      overflow: hidden;
      background: #000;
      aspect-ratio: 4/3;
      position: relative;
    }
    .feed-card video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ── Calibration overlay ─────────────────────────────────────── */
    #calib-overlay {
      position: absolute;
      inset: 0;
      background: rgba(10,10,11,.72);
      backdrop-filter: blur(2px);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      border-radius: var(--r);
    }
    #calib-overlay.visible { display: flex; }

    .calib-ring {
      width: 44px;
      height: 44px;
      border: 3px solid rgba(245,158,11,.2);
      border-top-color: var(--amber);
      border-radius: 50%;
      animation: cspin .9s linear infinite;
    }
    @keyframes cspin { to { transform: rotate(360deg); } }

    .calib-text {
      text-align: center;
      line-height: 1.5;
    }
    .calib-text strong {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: var(--amber);
    }
    .calib-text span {
      font-size: 12px;
      color: rgba(240,240,242,.5);
    }

    .calib-bar-track {
      width: 140px;
      height: 3px;
      background: rgba(245,158,11,.15);
      border-radius: 2px;
      overflow: hidden;
    }
    .calib-bar-fill {
      height: 100%;
      width: 0%;
      background: var(--amber);
      border-radius: 2px;
      transition: width .15s linear;
    }

    /* ── Sidebar ─────────────────────────────────────────────────── */
    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 12px;
      position: sticky;
      top: 24px;
    }

    /* ── Status cards ────────────────────────────────────────────── */
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: border-color .3s, background .3s;
    }
    .stat-card.alert {
      border-color: rgba(239,68,68,.45);
      background: var(--red-dim);
    }

    .stat-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--border-2);
      flex-shrink: 0;
      transition: background .3s, box-shadow .3s;
    }
    .stat-dot.on {
      background: var(--red);
      box-shadow: 0 0 0 3px var(--red-ring);
      animation: pulse 1.8s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 3px var(--red-ring); }
      50%      { box-shadow: 0 0 0 6px rgba(239,68,68,0); }
    }

    .stat-info { flex: 1; }
    .stat-name {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--muted);
    }
    .stat-val {
      font-size: 14px;
      font-weight: 600;
      margin-top: 3px;
      transition: color .3s;
    }
    .stat-card.alert .stat-val { color: var(--red); }

    /* ── Controls ────────────────────────────────────────────────── */
    .ctrl-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 16px;
    }

    .btn-start {
      width: 100%;
      padding: 11px;
      border: none;
      border-radius: var(--r-sm);
      background: var(--green);
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: filter .15s;
    }
    .btn-start:hover { filter: brightness(1.08); }
    .btn-start.stop {
      background: var(--red-dim);
      color: var(--red);
      border: 1px solid var(--red-ring);
    }

    /* ── Calibration sidebar chip ────────────────────────────────── */
    #calib-chip {
      display: none;
      align-items: center;
      gap: 8px;
      padding: 9px 13px;
      background: var(--amber-dim);
      border: 1px solid var(--amber-ring);
      border-radius: var(--r-sm);
      font-size: 12px;
      font-weight: 500;
      color: var(--amber);
    }
    #calib-chip.visible { display: flex; }
    .chip-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--amber);
      animation: blink-amber 1s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes blink-amber { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* ── Toast ───────────────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      max-width: 280px;
      padding: 9px 15px;
      background: var(--surface-2);
      border: 1px solid var(--border-2);
      border-radius: var(--r-sm);
      font-size: 12.5px;
      opacity: 0;
      transform: translateY(5px);
      transition: opacity .18s, transform .18s;
      pointer-events: none;
      z-index: 99;
    }
    #toast.show { opacity: 1; transform: none; }
    #toast.err  { border-color: rgba(239,68,68,.5); }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark">FT</div>
    Focus Tracker
  </div>
  <span class="status-badge" id="status-badge">Idle</span>
</header>

<main>
  <div class="layout">

    <div class="feed-card">
      <video id="video" autoplay playsinline muted></video>
      <div id="calib-overlay">
        <div class="calib-ring"></div>
        <div class="calib-text">
          <strong>Calibrating head pose</strong>
          <span>Sit normally and look at the screen</span>
        </div>
        <div class="calib-bar-track">
          <div class="calib-bar-fill" id="calib-bar"></div>
        </div>
      </div>
    </div>

    <div class="sidebar">

      <div id="calib-chip">
        <div class="chip-dot"></div>
        Calibrating…
      </div>

      <div class="stat-card" id="phone-card">
        <div class="stat-dot" id="phone-dot"></div>
        <div class="stat-info">
          <div class="stat-name">Phone</div>
          <div class="stat-val" id="phone-val">Not detected</div>
        </div>
      </div>

      <div class="stat-card" id="dist-card">
        <div class="stat-dot" id="dist-dot"></div>
        <div class="stat-info">
          <div class="stat-name">Attention</div>
          <div class="stat-val" id="dist-val">Focused</div>
        </div>
      </div>

      <div class="ctrl-card">
        <button class="btn-start" id="mon-btn">Start Monitoring</button>
      </div>

    </div>
  </div>
</main>

<div id="toast"></div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let monitoring = false;
let pollId     = null;

// ── DOM ────────────────────────────────────────────────────────────────────
const monBtn = document.getElementById('mon-btn');
const badge  = document.getElementById('status-badge');

// ── Webcam ─────────────────────────────────────────────────────────────────
navigator.mediaDevices.getUserMedia({ video: true, audio: false })
  .then(stream => { document.getElementById('video').srcObject = stream; })
  .catch(() => toast('Could not access webcam', true));

// ── Toast ──────────────────────────────────────────────────────────────────
let _tt;
function toast(msg, err = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.toggle('err', err);
  el.classList.add('show');
  clearTimeout(_tt);
  _tt = setTimeout(() => el.classList.remove('show'), 3000);
}

// ── Controls ───────────────────────────────────────────────────────────────
monBtn.addEventListener('click', () => monitoring ? stop() : start());

// ── Calibration progress bar (client-side estimate, ~45 frames @ 30fps ≈ 1.5s) ──
const CALIB_MS  = 1800;   // slightly longer than backend to avoid early hide
let _calibTimer = null;
let _calibStart = 0;

function startCalibUI() {
  const bar = document.getElementById('calib-bar');
  bar.style.width = '0%';
  document.getElementById('calib-overlay').classList.add('visible');
  document.getElementById('calib-chip').classList.add('visible');
  _calibStart = performance.now();
  _calibTimer = setInterval(() => {
    const pct = Math.min(((performance.now() - _calibStart) / CALIB_MS) * 100, 95);
    bar.style.width = pct + '%';
  }, 50);
}

function stopCalibUI() {
  clearInterval(_calibTimer);
  document.getElementById('calib-bar').style.width = '100%';
  setTimeout(() => {
    document.getElementById('calib-overlay').classList.remove('visible');
    document.getElementById('calib-chip').classList.remove('visible');
  }, 300);
}

async function start() {
  const r = await fetch('/start-monitoring', { method: 'POST' });
  const d = await r.json();
  if (!r.ok) { toast(d.error || 'Failed to start', true); return; }
  monitoring = true;
  monBtn.textContent = 'Stop Monitoring';
  monBtn.classList.add('stop');
  badge.textContent = 'Monitoring';
  badge.classList.add('running');
  startCalibUI();                      // show immediately, don't wait for poll
  pollId = setInterval(poll, 1000);
}

async function stop() {
  clearInterval(pollId);
  await fetch('/stop-monitoring', { method: 'POST' });
  monitoring = false;
  monBtn.textContent = 'Start Monitoring';
  monBtn.classList.remove('stop');
  badge.textContent = 'Idle';
  badge.classList.remove('running');
  stopCalibUI();
  setPhone(false);
  setDist(false, false);
}

// ── Status polling ─────────────────────────────────────────────────────────
let _wasCalibrating = true;

async function poll() {
  try {
    const d = await (await fetch('/status')).json();
    setPhone(d.phone);
    setDist(d.eyes_off, d.calibrating);
    // Hide overlay as soon as backend confirms calibration is done
    if (_wasCalibrating && !d.calibrating) stopCalibUI();
    _wasCalibrating = !!d.calibrating;
  } catch {}
}

function setPhone(on) {
  document.getElementById('phone-dot').classList.toggle('on', on);
  document.getElementById('phone-card').classList.toggle('alert', on);
  document.getElementById('phone-val').textContent = on ? 'Detected' : 'Not detected';
}

function setDist(on, calibrating) {
  const active = on && !calibrating;
  document.getElementById('dist-dot').classList.toggle('on', active);
  document.getElementById('dist-card').classList.toggle('alert', active);
  document.getElementById('dist-val').textContent =
    calibrating ? 'Calibrating…' : (on ? 'Distracted' : 'Focused');
}
</script>

</body>
</html>
